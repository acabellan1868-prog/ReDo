services:
  redo:
    build: .
    container_name: redo
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - /mnt/datos/redo:/app/data
    environment:
      - TZ=Europe/Madrid
      - REDO_DB_PATH=/app/data/redo.db
      - REDO_NETWORK=192.168.31.0/24
      - REDO_SCAN_INTERVAL=300
      - NTFY_TOPIC=hogaros-3ca6f61b
    restart: always
