<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReDo — Red Domestica</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F0E8;
            color: #1E1B2E;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: #1E1B2E; color: #fff;
            padding: 0.5rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header__logo { font-size: 1.1rem; font-weight: 700; color: #fff; text-decoration: none; }

        /* Contenedor */
        .contenedor { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

        /* Resumen */
        .resumen { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .resumen-tarjeta {
            background: #FDF9F3; border: 1px solid rgba(30,27,46,0.1);
            border-radius: 4px; padding: 1rem; text-align: center;
        }
        .resumen-tarjeta__label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(30,27,46,0.5); }
        .resumen-tarjeta__valor { font-size: 1.8rem; font-weight: 700; color: #6C63A8; }
        .resumen-tarjeta--ok .resumen-tarjeta__valor { color: #4CAF50; }
        .resumen-tarjeta--alerta .resumen-tarjeta__valor { color: #E53935; }

        /* Filtros */
        .filtros { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .filtro-btn {
            padding: 0.4rem 0.8rem; border: 1px solid rgba(30,27,46,0.15); border-radius: 4px;
            background: #FDF9F3; font-size: 0.82rem; cursor: pointer; font-family: inherit;
        }
        .filtro-btn--activo { background: #6C63A8; color: #fff; border-color: #6C63A8; }
        .btn-escanear {
            padding: 0.4rem 0.8rem; border: none; border-radius: 4px;
            background: #6C63A8; color: #fff; font-size: 0.82rem; cursor: pointer;
            font-family: inherit; font-weight: 600; margin-left: auto;
        }
        .btn-escanear:hover { background: #5A5296; }
        .btn-escanear:disabled { opacity: 0.5; cursor: wait; }

        /* Tabla */
        .tabla-wrap { background: #FDF9F3; border-radius: 4px; border: 1px solid rgba(30,27,46,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #EDE8F8; text-align: left; padding: 0.6rem 0.8rem; font-size: 0.75rem;
             text-transform: uppercase; letter-spacing: 0.04em; color: rgba(30,27,46,0.6); }
        td { padding: 0.5rem 0.8rem; border-top: 1px solid rgba(30,27,46,0.06); }
        tr:hover { background: rgba(108,99,168,0.04); }

        .estado-badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
            font-size: 0.72rem; font-weight: 600;
        }
        .estado-badge--confiable { background: #E8F5E9; color: #2E7D32; }
        .estado-badge--desconocido { background: #FFEBEE; color: #C62828; }

        .btn-accion {
            padding: 0.25rem 0.5rem; border: 1px solid rgba(30,27,46,0.15); border-radius: 4px;
            background: #FDF9F3; font-size: 0.75rem; cursor: pointer; font-family: inherit;
        }
        .btn-accion--confiable { border-color: #4CAF50; color: #2E7D32; }
        .btn-accion--confiable:hover { background: #E8F5E9; }
        .btn-accion--desconocido { border-color: #E53935; color: #C62828; }
        .btn-accion--desconocido:hover { background: #FFEBEE; }

        .btn-accion--nombre { border-color: #6C63A8; color: #6C63A8; }
        .btn-accion--nombre:hover { background: #EDE8F8; }
        .nombre-disp { color: #1E1B2E; font-size: 0.88rem; }
        .sin-datos { text-align: center; padding: 2rem; color: rgba(30,27,46,0.4); font-style: italic; }
        .hostname { color: rgba(30,27,46,0.5); font-size: 0.78rem; }
        .fecha-col { font-size: 0.78rem; color: rgba(30,27,46,0.5); white-space: nowrap; }

        @media (max-width: 600px) {
            .contenedor { padding: 1rem; }
            .resumen { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 0.4rem 0.5rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="header__logo">ReDo</a>
    </header>

    <main class="contenedor">

        <!-- Resumen -->
        <div class="resumen">
            <div class="resumen-tarjeta">
                <div class="resumen-tarjeta__label">Activos</div>
                <div class="resumen-tarjeta__valor" id="numActivos">-</div>
            </div>
            <div class="resumen-tarjeta resumen-tarjeta--ok">
                <div class="resumen-tarjeta__label">Confiables</div>
                <div class="resumen-tarjeta__valor" id="numConfiables">-</div>
            </div>
            <div class="resumen-tarjeta resumen-tarjeta--alerta">
                <div class="resumen-tarjeta__label">Desconocidos</div>
                <div class="resumen-tarjeta__valor" id="numDesconocidos">-</div>
            </div>
            <div class="resumen-tarjeta">
                <div class="resumen-tarjeta__label">Ultimo escaneo</div>
                <div class="resumen-tarjeta__valor" id="ultimoEscaneo" style="font-size:0.9rem;">-</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros">
            <button class="filtro-btn filtro-btn--activo" data-filtro="todos">Todos</button>
            <button class="filtro-btn" data-filtro="confiable">Confiables</button>
            <button class="filtro-btn" data-filtro="desconocido">Desconocidos</button>
            <button class="btn-escanear" id="btnEscanear">Escanear ahora</button>
        </div>

        <!-- Tabla -->
        <div class="tabla-wrap">
            <table>
                <thead>
                    <tr>
                        <th>IP</th>
                        <th>MAC / Fabricante</th>
                        <th>Estado</th>
                        <th>Visto</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <tbody id="tablaDispositivos">
                    <tr><td colspan="5" class="sin-datos">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        /* Prefijo para funcionar bajo proxy (/red/) o directo */
        var BASE = (function() {
            var ruta = window.location.pathname;
            var partes = ruta.match(/^(\/[^/]+)\//);
            if (partes && partes[1] !== '/api') return partes[1];
            return '';
        })();

        var filtroActual = 'todos';

        function cargarResumen() {
            fetch(BASE + '/api/resumen')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    document.getElementById('numActivos').textContent = d.dispositivos_activos;
                    document.getElementById('numConfiables').textContent = d.dispositivos_confiables;
                    document.getElementById('numDesconocidos').textContent = d.dispositivos_desconocidos;
                    document.getElementById('ultimoEscaneo').textContent =
                        d.ultimo_escaneo ? formatearFecha(d.ultimo_escaneo) : 'Nunca';
                });
        }

        function cargarDispositivos() {
            var url = BASE + '/api/dispositivos';
            if (filtroActual === 'confiable') url += '?confiable=1';
            else if (filtroActual === 'desconocido') url += '?confiable=0';

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(lista) {
                    var tbody = document.getElementById('tablaDispositivos');

                    if (lista.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="sin-datos">No hay dispositivos</td></tr>';
                        return;
                    }

                    tbody.innerHTML = lista.map(function(d) {
                        var esConfiable = d.confiable === 1;
                        var nombre = d.notas || '';
                        var info = '';
                        if (nombre) info += '<strong class="nombre-disp">' + nombre + '</strong><br>';
                        info += '<span class="hostname">' + d.mac + '</span>';
                        if (d.fabricante) info += '<br><span class="hostname">' + d.fabricante + '</span>';
                        if (d.hostname) info += ' · <span class="hostname">' + d.hostname + '</span>';

                        return '<tr>' +
                            '<td><strong>' + (d.ip || '?') + '</strong></td>' +
                            '<td>' + info + '</td>' +
                            '<td><span class="estado-badge ' +
                                (esConfiable ? 'estado-badge--confiable' : 'estado-badge--desconocido') + '">' +
                                (esConfiable ? 'Confiable' : 'Desconocido') + '</span></td>' +
                            '<td class="fecha-col">' + formatearFecha(d.ultima_vez) + '</td>' +
                            '<td>' +
                                '<button class="btn-accion btn-accion--nombre" onclick="editarNombre(' + d.id + ')" title="Renombrar">&#9998;</button> ' +
                                (esConfiable
                                    ? '<button class="btn-accion btn-accion--desconocido" onclick="cambiarEstado(' + d.id + ', 0)">Desconocido</button>'
                                    : '<button class="btn-accion btn-accion--confiable" onclick="cambiarEstado(' + d.id + ', 1)">Confiable</button>'
                                ) +
                            '</td>' +
                        '</tr>';
                    }).join('');
                });
        }

        function editarNombre(id) {
            var nombre = prompt('Nombre para este dispositivo (ej: Movil Xiaomi, Impresora laser...):');
            if (nombre === null) return;
            fetch(BASE + '/api/dispositivos/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notas: nombre })
            })
            .then(function() { cargarDispositivos(); });
        }

        function cambiarEstado(id, confiable) {
            fetch(BASE + '/api/dispositivos/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ confiable: confiable })
            })
            .then(function() {
                cargarDispositivos();
                cargarResumen();
            });
        }

        document.getElementById('btnEscanear').addEventListener('click', function() {
            var btn = this;
            btn.disabled = true;
            btn.textContent = 'Escaneando...';
            fetch(BASE + '/api/escanear', { method: 'POST' })
                .then(function() {
                    btn.textContent = 'Listo';
                    setTimeout(function() {
                        btn.disabled = false;
                        btn.textContent = 'Escanear ahora';
                        cargarResumen();
                        cargarDispositivos();
                    }, 3000);
                })
                .catch(function() {
                    btn.disabled = false;
                    btn.textContent = 'Escanear ahora';
                });
        });

        document.querySelectorAll('.filtro-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                filtroActual = this.getAttribute('data-filtro');
                document.querySelectorAll('.filtro-btn').forEach(function(b) {
                    b.classList.remove('filtro-btn--activo');
                });
                this.classList.add('filtro-btn--activo');
                cargarDispositivos();
            });
        });

        function formatearFecha(iso) {
            if (!iso) return '-';
            try {
                var d = new Date(iso);
                return d.toLocaleString('es-ES', {
                    day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                });
            } catch(e) { return iso; }
        }

        cargarResumen();
        cargarDispositivos();
        setInterval(function() { cargarResumen(); cargarDispositivos(); }, 30000);
    </script>

</body>
</html>
